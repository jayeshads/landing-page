<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cuteness Meter</title>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#220022,#000);
font-family:Poppins,sans-serif;
position:relative;
color:#fff;
}
body::before{
content:'';
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(rgba(255,255,255,.08) 1px,transparent 1px);
background-size:35px 35px;
animation:bgMove 35s linear infinite;
}
@keyframes bgMove{
to{transform:translate(-180px,-180px)}
}
.aurora{
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,rgba(255,0,128,.25),transparent 70%);
filter:blur(90px);
animation:aurora 8s ease-in-out infinite alternate;
}
@keyframes aurora{
from{transform:translate(-80px,-40px)}
to{transform:translate(80px,40px)}
}
.card{
width:92vw;
max-width:340px;
padding:24px;
border-radius:26px;
background:rgba(255,0,120,.08);
backdrop-filter:blur(18px);
box-shadow:0 0 30px rgba(255,0,150,.35);
text-align:center;
z-index:2;
animation:floatCard 4s ease-in-out infinite;
}
@keyframes floatCard{
50%{transform:translateY(-8px)}
}
h2{
font-family:Parisienne,cursive;
font-size:42px;
margin-bottom:10px;
background:linear-gradient(45deg,#ff8cc8,#ff0080);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.percent{
font-size:56px;
font-weight:700;
margin:16px 0;
background:linear-gradient(45deg,#ff9bd2,#ff0080);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
50%{transform:scale(1.08)}
}
.progress{
height:18px;
background:#260014;
border-radius:50px;
overflow:hidden;
position:relative;
}
.bar1,.bar2{
position:absolute;
top:0;left:0;
height:100%;
width:0%;
border-radius:50px;
}
.bar1{
background:linear-gradient(90deg,#ff8ac5,#ff4da6);
box-shadow:0 0 15px #ff4da6;
}
.bar2{
background:linear-gradient(90deg,#ff0080,#d10069);
box-shadow:0 0 20px #ff0080;
}
.progress::after{
content:'';
position:absolute;
top:0;
left:-40%;
width:40%;
height:100%;
background:linear-gradient(to right,transparent,rgba(255,255,255,.45),transparent);
animation:shine 2s linear infinite;
}
@keyframes shine{
to{left:120%}
}
.status{
margin-top:18px;
min-height:36px;
font-size:14px;
}
.warning{
color:#ff6db6;
font-weight:700;
text-shadow:0 0 10px #ff0080,0 0 20px #ff0080;
animation:popup 1s infinite;
}
@keyframes popup{
0%{opacity:0;transform:scale(.2)}
35%{opacity:1;transform:scale(1.25)}
55%{transform:scale(.9)}
75%{transform:scale(1.08)}
100%{opacity:1;transform:scale(1)}
}
.btn{
margin-top:18px;
padding:13px 24px;
border:none;
border-radius:40px;
font-weight:700;
font-size:15px;
color:white;
background:linear-gradient(45deg,#ff4da6,#ff0080);
position:relative;
overflow:hidden;
}
.btn::before{
content:'';
position:absolute;
width:50px;
height:200%;
background:rgba(255,255,255,.35);
top:-50%;
left:-100px;
transform:rotate(25deg);
}
.btn:hover::before{animation:btnshine .8s forwards}
@keyframes btnshine{to{left:250px}}

.heart,.sparkle,.rose,.star{
position:absolute;
pointer-events:none;
z-index:1;
}
.heart{color:#ff4da6;animation:up 6s linear forwards}
.rose{animation:down 8s linear forwards}
.sparkle{
width:4px;height:4px;background:white;border-radius:50%;
animation:spark 4s linear forwards
}
.star{color:white;animation:twinkle 2s infinite}
@keyframes up{to{transform:translateY(-100vh);opacity:0}}
@keyframes down{to{transform:translateY(110vh) rotate(360deg);opacity:.3}}
@keyframes spark{to{transform:translateY(-300px);opacity:0}}
@keyframes twinkle{50%{opacity:.2;transform:scale(.5)}}
</style>
</head>
<body>
<div class="aurora"></div>

<div class="card">
<h2>Measuring your cuteness...</h2>
<div class="percent" id="percent">0%</div>

<div class="progress">
<div class="bar1" id="bar1"></div>
<div class="bar2" id="bar2"></div>
</div>

<div class="status" id="status">Calculating cuteness...</div>

<button class="btn" onclick="location.href='03.html'">Open My Heart 🤍</button>
</div>

<script>
let p=0;
const percent=document.getElementById('percent');
const bar1=document.getElementById('bar1');
const bar2=document.getElementById('bar2');
const status=document.getElementById('status');

const timer=setInterval(()=>{
p++;
percent.innerHTML=p+'%';

if(p<=100) bar1.style.width=p+'%';
if(p>100 && p<=120) bar2.style.width=(p-100)+'%';

if(p>=120){
clearInterval(timer);
status.innerHTML='⚠️ Warning: Too Cute To Handle 💖';
status.classList.add('warning');
}
},28);

function heart(){
let e=document.createElement('div');
e.className='heart';
e.innerHTML='❤';
e.style.left=Math.random()*100+'vw';
e.style.bottom='-20px';
document.body.appendChild(e);
setTimeout(()=>e.remove(),6000);
}
setInterval(heart,500);

function sparkle(){
let e=document.createElement('div');
e.className='sparkle';
e.style.left=Math.random()*100+'vw';
e.style.bottom='0';
document.body.appendChild(e);
setTimeout(()=>e.remove(),4000);
}
setInterval(sparkle,250);

function rose(){
let e=document.createElement('div');
e.className='rose';
e.innerHTML='🌹';
e.style.left=Math.random()*100+'vw';
e.style.top='-20px';
document.body.appendChild(e);
setTimeout(()=>e.remove(),8000);
}
setInterval(rose,1500);

for(let i=0;i<25;i++){
let s=document.createElement('div');
s.className='star';
s.innerHTML='✦';
s.style.left=Math.random()*100+'vw';
s.style.top=Math.random()*100+'vh';
s.style.animationDelay=Math.random()*2+'s';
document.body.appendChild(s);
}
</script>
</body>
</html>
